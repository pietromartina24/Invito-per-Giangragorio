<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f6efe2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Pietro & Martina - Invito</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=EB+Garamond:ital@0;1&display=swap');

:root {
  --cream: #f6efe2;
  --cream-2: #efe2c9;
  --paper-shadow: #d9c6a3;
  --mattone: #a8462e;
  --mattone-dark: #7e3220;
  --mattone-light: #c96b4d;
  --ink: #4a3324;
  --ink-soft: #7a6650;
  --gold: #b98a4a;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  background: radial-gradient(ellipse at top, #fbf6ea 0%, var(--cream) 55%, #ecdfc4 100%);
  font-family: 'EB Garamond', serif;
  color: var(--ink);
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
}

.stage {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 18px calc(40px + env(safe-area-inset-bottom));
  position: relative;
  width: 100%;
}

.stage::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(168,70,46,0.06) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events: none;
}

.scene {
  position: relative;
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(28px, 9vw, 42px);
  color: var(--mattone-dark);
  text-align: center;
  margin: 0 0 6px 0;
  line-height: 1.25;
  letter-spacing: 0.5px;
  opacity: 0;
  animation: fadeDown 1s ease-out 0.2s forwards;
  padding: 0 8px;
  word-break: keep-all;
}

.subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(12px, 3.2vw, 15px);
  color: var(--ink-soft);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin: 0 0 30px 0;
  opacity: 0;
  animation: fadeDown 1s ease-out 0.4s forwards;
  text-align: center;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===================== ENVELOPE ===================== */
.envelope-wrap {
  perspective: 1400px;
  width: min(82vw, 340px);
  opacity: 0;
  animation: riseIn 0.9s ease-out 0.5s forwards;
}

@keyframes riseIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.envelope {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 2;
  filter: drop-shadow(0 18px 30px rgba(90, 55, 30, 0.28));
  transition: transform 0.9s cubic-bezier(.6,.05,.3,1), opacity 0.6s ease 0.3s;
}

.envelope.opened {
  transform: translateY(26px) scale(0.94);
}

.envelope.hidden-away {
  opacity: 0;
  pointer-events: none;
}

.env-body {
  position: absolute;
  inset: 0;
  background: linear-gradient(155deg, var(--cream) 0%, var(--cream-2) 100%);
  border-radius: 6px;
  box-shadow: inset 0 0 0 1px rgba(168,70,46,0.15);
  overflow: hidden;
}

.env-body::before, .env-body::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 0; height: 0;
  border-style: solid;
}
.env-body::before {
  left: 0;
  border-width: 0 0 68% 50%;
  border-color: transparent transparent rgba(168,70,46,0.06) transparent;
}
.env-body::after {
  right: 0;
  border-width: 68% 0 0 50%;
  border-color: transparent transparent transparent rgba(168,70,46,0.06);
}

.env-bottom-fold {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 62%;
  background: linear-gradient(160deg, rgba(217,198,163,0.55), rgba(217,198,163,0) 60%);
  clip-path: polygon(0 100%, 50% 22%, 100% 100%);
}

.env-flap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 58%;
  transform-origin: top center;
  transform-style: preserve-3d;
  transition: transform 1.1s cubic-bezier(.7,-0.1,.25,1);
  z-index: 6;
}

.env-flap-face {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, var(--cream-2) 0%, #e6d6b2 100%);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  box-shadow: inset 0 -6px 14px rgba(126,50,32,0.08);
  backface-visibility: hidden;
}

.env-flap-back {
  position: absolute;
  inset: 0;
  background: linear-gradient(160deg, #e3d3ad 0%, #d5c090 100%);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  backface-visibility: hidden;
  transform: rotateX(180deg);
}

.envelope.opened .env-flap {
  transform: rotateX(180deg);
}

.env-names {
  position: absolute;
  left: 0; right: 0;
  top: 60%;
  text-align: center;
  font-family: 'Great Vibes', cursive;
  font-size: clamp(20px, 4.6vw, 27px);
  color: var(--mattone-dark);
  z-index: 3;
  pointer-events: none;
}

.env-names span {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--ink-soft);
  text-transform: uppercase;
  margin-top: 2px;
}

/* bow / fiocco */
.bow {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 74px;
  height: 60px;
  z-index: 8;
  transition: transform 0.6s ease, opacity 0.5s ease;
  transform-origin: center;
}

.bow.untied {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.4) rotate(35deg);
}

.bow svg { width: 100%; height: 100%; display: block; overflow: visible; }

/* ===================== BUTTON ===================== */
.open-btn {
  margin-top: 34px;
  padding: 15px 30px;
  min-height: 48px;
  background: var(--mattone);
  color: #fbf3e7;
  border: none;
  border-radius: 999px;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(14px, 4vw, 17px);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(126,50,32,0.35);
  transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.4s ease;
  opacity: 0;
  animation: fadeDown 1s ease-out 0.9s forwards;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  text-align: center;
  max-width: 92vw;
}
.open-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(126,50,32,0.42); }
.open-btn:active { transform: translateY(0) scale(0.97); }
.open-btn.gone {
  opacity: 0 !important;
  pointer-events: none;
  transform: translateY(10px) scale(0.94);
}

/* ===================== CARD REVEAL ===================== */
.card-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  width: min(90vw, 400px);
  max-height: 88dvh;
  transform: translate(-50%, -46%) scale(0.15);
  opacity: 0;
  z-index: 20;
  pointer-events: none;
  transition: transform 1.1s cubic-bezier(.34,1.2,.4,1) 0.35s, opacity 0.5s ease 0.35s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.card-wrap.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}

.card-inner {
  position: relative;
  background: #fff;
  border-radius: 4px;
  box-shadow: 0 30px 60px rgba(74,51,36,0.4), 0 4px 12px rgba(74,51,36,0.2);
  padding: 10px;
  border: 1px solid rgba(168,70,46,0.15);
  max-height: 78dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card-inner img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 2px;
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 16px;
  padding: 8px 16px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--mattone);
  text-decoration: none;
  letter-spacing: 0.5px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.back-link:hover, .back-link:active { color: var(--mattone-dark); text-decoration: underline; }

@media (max-width: 380px) {
  .names { font-size: 30px; }
  .subtitle { margin-bottom: 24px; }
  .open-btn { margin-top: 26px; padding: 13px 22px; }
}

@media (max-height: 700px) {
  .stage { padding-top: 20px; padding-bottom: 24px; align-items: flex-start; }
  .names { margin-top: 4px; }
}
</style>
</head>

const openBtn = document.getElementById('openBtn');
const envelope = document.getElementById('envelope');
const bow = document.getElementById('bow');
const cardWrap = document.getElementById('cardWrap');
const backLink = document.getElementById('backLink');

openBtn.addEventListener('click', () => {
  bow.classList.add('untied');
  openBtn.classList.add('gone');

  setTimeout(() => {
    envelope.classList.add('opened');
  }, 250);

  setTimeout(() => {
    cardWrap.classList.add('show');
  }, 550);

  setTimeout(() => {
    envelope.classList.add('hidden-away');
  }, 900);
});

backLink.addEventListener('click', () => {
  cardWrap.classList.remove('show');
  envelope.classList.remove('hidden-away');
  setTimeout(() => {
    envelope.classList.remove('opened');
    bow.classList.remove('untied');
    openBtn.classList.remove('gone');
  }, 300);
});
</script>

</body>
</html>
